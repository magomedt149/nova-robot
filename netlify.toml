[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "microphone=(self), accelerometer=(self), gyroscope=(self), magnetometer=(self)"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
